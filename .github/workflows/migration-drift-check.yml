name: Migration drift check

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-drift:
    name: Check for unapplied migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing SUPABASE_DB_URL secret. Copy the value from Lovable → Project Settings → Cloud → Secrets (SUPABASE_DB_URL) and paste it into GitHub Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Detect drift
        id: drift
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          # List local migration timestamps (filename prefix before first underscore)
          mkdir -p /tmp/drift
          if [ -d supabase/migrations ]; then
            ls supabase/migrations 2>/dev/null \
              | grep -E '^[0-9]{14}_.*\.sql$' \
              | sed 's/_.*//' \
              | sort -u > /tmp/drift/local.txt || true
          fi
          touch /tmp/drift/local.txt
          echo "Local migrations:"; cat /tmp/drift/local.txt || true

          # Query applied migrations from Supabase
          psql "$SUPABASE_DB_URL" -At -c \
            "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version;" \
            > /tmp/drift/remote.txt
          echo "Remote migrations:"; cat /tmp/drift/remote.txt || true

          # Lines in local but not in remote
          comm -23 /tmp/drift/local.txt /tmp/drift/remote.txt > /tmp/drift/pending.txt
          pending=$(cat /tmp/drift/pending.txt)

          if [ -z "$pending" ]; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "✅ All migrations applied."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            {
              echo "pending<<EOF"
              echo "$pending"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "⚠️ Unapplied migrations:"
            echo "$pending"
          fi

      - name: Comment on PR if drift detected
        if: github.event_name == 'pull_request' && steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pending = `${{ steps.drift.outputs.pending }}`.trim().split('\n').filter(Boolean);
            const list = pending.map(p => `- \`${p}\``).join('\n');
            const body = [
              '### ⚠️ Unapplied database migrations',
              '',
              'Dessa migreringar finns i `supabase/migrations/` men är **inte applicerade** på Lovable Cloud-databasen:',
              '',
              list,
              '',
              '**Nästa steg:** Öppna Lovable och be agenten köra de pending migreringarna via migration-toolet.',
              '',
              '_Posted by `migration-drift-check` workflow._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Open or update issue if drift on main
        if: github.event_name == 'push' && steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pending = `${{ steps.drift.outputs.pending }}`.trim().split('\n').filter(Boolean);
            const list = pending.map(p => `- \`${p}\``).join('\n');
            const title = '⚠️ Unapplied database migrations on main';
            const body = [
              'Workflow `migration-drift-check` upptäckte migreringar på `main` som inte är applicerade på Lovable Cloud-databasen.',
              '',
              '**Pending:**',
              list,
              '',
              `**Commit:** ${context.sha}`,
              '',
              '**Nästa steg:** Öppna Lovable och be agenten köra de pending migreringarna via migration-toolet. Issuen stängs automatiskt nästa gång workflowen kör grönt.',
            ].join('\n');

            for (const name of ['migrations', 'automated']) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: name === 'migrations' ? 'fbca04' : 'ededed',
                });
              }
            }

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'migrations,automated',
            });

            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body,
              });
              console.log(`Updated existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['migrations', 'automated'],
              });
              console.log(`Created issue #${created.data.number}`);
            }

      - name: Close drift issue if clean on main
        if: github.event_name == 'push' && steps.drift.outputs.has_drift == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'migrations,automated',
            });
            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Alla migreringar applicerade på ${context.sha}. Stänger automatiskt.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Fail PR check if drift detected
        if: github.event_name == 'pull_request' && steps.drift.outputs.has_drift == 'true'
        run: |
          echo "::error::Unapplied migrations detected — see PR comment."
          exit 1
