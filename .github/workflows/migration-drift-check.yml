name: Migration drift check

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  SUPABASE_PROJECT_REF: gwmkcckkztlicbnqqklp

jobs:
  check-drift:
    name: Check for unapplied migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN or SUPABASE_DB_PASSWORD secret. Add them in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: List migrations and detect drift
        id: drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/drift
          # `supabase migration list --linked` prints: Local | Remote | Time
          supabase migration list --linked --password "$SUPABASE_DB_PASSWORD" > /tmp/drift/list.txt 2>&1 || {
            cat /tmp/drift/list.txt
            echo "::error::supabase migration list failed. Check that SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD are valid."
            exit 1
          }
          cat /tmp/drift/list.txt

          # Parse rows of the form: "  20240101120000 |                | 2024-01-01 12:00:00"
          # An empty Remote column (between the two pipes) = unapplied locally.
          pending=$(awk -F'|' '
            /^[[:space:]]*[0-9]{14}[[:space:]]*\|/ {
              local=$1; remote=$2;
              gsub(/[[:space:]]/, "", local);
              gsub(/[[:space:]]/, "", remote);
              if (local != "" && remote == "") print local;
            }
          ' /tmp/drift/list.txt)

          if [ -z "$pending" ]; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "✅ All migrations are applied to remote."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            {
              echo "pending<<EOF"
              echo "$pending"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "⚠️ Unapplied migrations detected:"
            echo "$pending"
          fi

      - name: Comment on PR if drift detected
        if: github.event_name == 'pull_request' && steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pending = `${{ steps.drift.outputs.pending }}`.trim().split('\n').filter(Boolean);
            const list = pending.map(p => `- \`${p}\``).join('\n');
            const body = [
              '### ⚠️ Unapplied database migrations',
              '',
              'Dessa migreringar finns i `supabase/migrations/` men är **inte applicerade** på Lovable Cloud-databasen:',
              '',
              list,
              '',
              '**Nästa steg:** Öppna Lovable och be agenten köra de pending migreringarna via migration-toolet.',
              '',
              '_Posted by `migration-drift-check` workflow._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Open or update issue if drift on main
        if: github.event_name == 'push' && steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pending = `${{ steps.drift.outputs.pending }}`.trim().split('\n').filter(Boolean);
            const list = pending.map(p => `- \`${p}\``).join('\n');
            const title = '⚠️ Unapplied database migrations on main';
            const body = [
              'Workflow `migration-drift-check` detected migrations on `main` that have not been applied to the Lovable Cloud database.',
              '',
              '**Pending:**',
              list,
              '',
              `**Commit:** ${context.sha}`,
              '',
              '**Nästa steg:** Öppna Lovable och be agenten köra de pending migreringarna via migration-toolet. Issuen stängs automatiskt nästa gång workflowen kör grönt.',
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'migrations,automated',
            });

            // Ensure labels exist (idempotent)
            for (const name of ['migrations', 'automated']) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: name === 'migrations' ? 'fbca04' : 'ededed',
                });
              }
            }

            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body,
              });
              console.log(`Updated existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['migrations', 'automated'],
              });
              console.log(`Created issue #${created.data.number}`);
            }

      - name: Close drift issue if clean on main
        if: github.event_name == 'push' && steps.drift.outputs.has_drift == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'migrations,automated',
            });
            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ All migrations now applied as of ${context.sha}. Closing automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Fail PR check if drift detected
        if: github.event_name == 'pull_request' && steps.drift.outputs.has_drift == 'true'
        run: |
          echo "::error::Unapplied migrations detected — see PR comment."
          exit 1
