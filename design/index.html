<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareKompass v6 — Design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="components/ds.jsx"></script>
  <script type="text/babel" src="components/landing.jsx"></script>
  <script type="text/babel" src="components/auth-public.jsx"></script>
  <script type="text/babel" src="components/dashboard.jsx"></script>
  <script type="text/babel" src="components/deviations.jsx"></script>
  <script type="text/babel" src="components/modules.jsx"></script>
  <script type="text/babel" src="components/specialized.jsx"></script>
  <script type="text/babel" src="components/modules-2.jsx"></script>
  <script type="text/babel" src="components/modules-3.jsx"></script>
  <script type="text/babel" src="components/admin-extra.jsx"></script>
  <script type="text/babel" src="components/public-extras.jsx"></script>
  <script type="text/babel" src="components/mobile-shell.jsx"></script>
  <script type="text/babel" src="components/mobile-public.jsx"></script>
  <script type="text/babel" src="components/mobile-auth.jsx"></script>
  <script type="text/babel" src="components/mobile-app.jsx"></script>
  <script type="text/babel" src="components/mobile-app2.jsx"></script>
  <script type="text/babel" src="components/mobile-app3.jsx"></script>
  <script type="text/babel" src="components/mobile-special.jsx"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: oklch(0.96 0.005 80); }
    #root { height: 100%; }

    /* Tweak overrides — applied by Tweaks panel */
    :root[data-ck-primary="forest"]  { --ck-primary: oklch(0.42 0.06 175); --ck-primary-hover: oklch(0.36 0.07 175); --ck-primary-soft: oklch(0.95 0.025 175); }
    :root[data-ck-primary="blue"]    { --ck-primary: oklch(0.40 0.10 240); --ck-primary-hover: oklch(0.34 0.11 240); --ck-primary-soft: oklch(0.95 0.025 240); }
    :root[data-ck-primary="clay"]    { --ck-primary: oklch(0.50 0.10 40);  --ck-primary-hover: oklch(0.44 0.11 40);  --ck-primary-soft: oklch(0.95 0.025 50);  }
    :root[data-ck-primary="slate"]   { --ck-primary: oklch(0.30 0.025 260); --ck-primary-hover: oklch(0.24 0.025 260); --ck-primary-soft: oklch(0.94 0.012 260); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useEffect } = React;

    const TWEAK_DEFAULTS = {
      primary: "forest",          // forest / blue / clay / slate
      industry: "estetisk",       // estetisk / fotvard / piercing
      density: "regular",         // compact / regular / comfy
      dark: false,
    };

    function ArtboardFrame({ children, width = 1440, height = 980, scale = 1 }) {
      // Wrap each artboard so it gets exact px dimensions inside the canvas.
      return (
        <div style={{
          width: width * scale, height: height * scale,
          overflow: "hidden", borderRadius: 8,
          background: "var(--ck-bg)",
          position: "relative",
        }}>
          <div style={{
            width, height,
            transform: scale === 1 ? "none" : `scale(${scale})`,
            transformOrigin: "top left",
          }}>{children}</div>
        </div>
      );
    }

    function CareKompassDesign() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.setAttribute("data-ck-primary", t.primary);
        document.documentElement.classList.toggle("ck-dark", !!t.dark);
      }, [t.primary, t.dark]);

      // Industry: just swap a couple of words via CSS custom prop or rerender. Skipping deep terminology hook; the design canvas is mostly est-injektion focused.

      const W = 1440, H_DESKTOP = 980, H_LANDING = 3200, H_PRICING = 1640;

      return (
        <>
          <DesignCanvas title="CareKompass v6.0 — Design exploration" subtitle="Klinisk, varmt neutral · forest-teal primär · est-injektion (Derma Beauty pilot)">

            <DCSection id="brand" title="01 — Design system" subtitle="Färg, typografi, komponenter och principer">
              <DCArtboard id="ds" label="DS · översikt" width={1280} height={900}>
                <DesignSystem />
              </DCArtboard>
            </DCSection>

            <DCSection id="public" title="02 — Publika sidor" subtitle="Marknadsföring, positionering, ansvarsgräns">
              <DCArtboard id="landing" label="Landing · /" width={W} height={H_LANDING}>
                <Landing />
              </DCArtboard>
              <DCArtboard id="pricing" label="Pricing · /pricing" width={W} height={H_PRICING}>
                <Pricing />
              </DCArtboard>
            </DCSection>

            <DCSection id="auth" title="03 — Auth & onboarding" subtitle="Konto, BankID-väg, bransch-wizard">
              <DCArtboard id="login" label="Login · /login" width={W} height={H_DESKTOP}>
                <Login />
              </DCArtboard>
              <DCArtboard id="onboarding" label="Onboarding · steg 3 av 6" width={W} height={H_DESKTOP}>
                <Onboarding />
              </DCArtboard>
            </DCSection>

            <DCSection id="app" title="04 — Privata sidor · AppShell" subtitle="Sidebar, topbar, klinik-switcher, trial-banner">
              <DCArtboard id="dashboard" label="Dashboard · /app" width={W} height={H_DESKTOP}>
                <Dashboard />
              </DCArtboard>
            </DCSection>

            <DCSection id="deviations" title="05 — Avvikelsemodul" subtitle="Representativ CRUD-loop · gäller alla moduler">
              <DCArtboard id="dev-list" label="Avvikelser · lista" width={W} height={H_DESKTOP}>
                <DeviationsList />
              </DCArtboard>
              <DCArtboard id="dev-detail" label="Avvikelse · detalj" width={W} height={H_DESKTOP}>
                <DeviationDetail />
              </DCArtboard>
              <DCArtboard id="dev-new" label="Avvikelse · skapa" width={W} height={H_DESKTOP}>
                <DeviationNew />
              </DCArtboard>
            </DCSection>

            <DCSection id="modules" title="06 — Övriga moduler" subtitle="Compliance Center, Ordination-inbox, Läkemedel">
              <DCArtboard id="compliance" label="Compliance Center" width={W} height={H_DESKTOP}>
                <ComplianceCenter />
              </DCArtboard>
              <DCArtboard id="ord-inbox" label="Ordination · konsult-inbox" width={W} height={H_DESKTOP}>
                <OrdinationInbox />
              </DCArtboard>
              <DCArtboard id="meds" label="Läkemedel & batchar" width={W} height={H_DESKTOP}>
                <Medications />
              </DCArtboard>
            </DCSection>

            <DCSection id="modules-extra" title="06b — Övriga kärnmoduler" subtitle="Styrdokument, hygien-desktop, risk, personal, audit">
              <DCArtboard id="documents" label="Styrdokument · lista" width={W} height={H_DESKTOP}>
                <Documents />
              </DCArtboard>
              <DCArtboard id="hygiene-d" label="Hygien · veckoschema" width={W} height={H_DESKTOP}>
                <HygieneDesktop />
              </DCArtboard>
              <DCArtboard id="risk" label="Riskanalys · 5×5 matrix" width={W} height={H_DESKTOP}>
                <RiskAnalysis />
              </DCArtboard>
              <DCArtboard id="staff" label="Personal & legitimation" width={W} height={H_DESKTOP}>
                <Staff />
              </DCArtboard>
              <DCArtboard id="audit" label="Audit log" width={W} height={H_DESKTOP}>
                <AuditLog />
              </DCArtboard>
              <DCArtboard id="notifications" label="Notifieringar (dropdown)" width={W} height={H_DESKTOP}>
                <NotificationsView />
              </DCArtboard>
            </DCSection>

            <DCSection id="later-modules" title="07 — Fas 8–9 moduler" subtitle="Patienter (PDL), externa behandlare, settings">
              <DCArtboard id="customers" label="Patienter · m. PDL-disclaimer" width={W} height={H_DESKTOP}>
                <Customers />
              </DCArtboard>
              <DCArtboard id="externals" label="Externa behandlare & rumsuthyrning" width={W} height={H_DESKTOP}>
                <ExternalPractitioners />
              </DCArtboard>
              <DCArtboard id="settings-co" label="Inställningar · bolag" width={W} height={H_DESKTOP}>
                <SettingsCompany />
              </DCArtboard>
              <DCArtboard id="settings-bill" label="Inställningar · billing (Stripe)" width={W} height={H_DESKTOP}>
                <SettingsBilling />
              </DCArtboard>
            </DCSection>

            <DCSection id="mobile" title="08 — Hygien på mobil" subtitle="Personal i klinik utför schemalagda kontroller">
              <DCArtboard id="hygiene-m" label="Hygienkontroll · iPhone" width={376} height={756}>
                <div style={{ display: "grid", placeItems: "center", width: "100%", height: "100%", padding: 8 }}>
                  <HygieneMobile />
                </div>
              </DCArtboard>
            </DCSection>

            <DCSection id="inspector" title="09 — Inspector mode" subtitle="Read-only token-läge för IVO/Miljöförvaltningen">
              <DCArtboard id="inspector" label="Inspector · /inspect/:token" width={W} height={H_DESKTOP}>
                <Inspector />
              </DCArtboard>
            </DCSection>

            <DCSection id="admin" title="10 — CK-admin · 10 flikar" subtitle="System admin med PII-maskering, impersonation, supportkö">
              <DCArtboard id="admin-co" label="Företag · godkännanden" width={W} height={H_DESKTOP}>
                <AdminCompanies />
              </DCArtboard>
              <DCArtboard id="admin-users" label="Användare + impersonation-modal" width={W} height={H_DESKTOP}>
                <AdminUsers />
              </DCArtboard>
              <DCArtboard id="admin-billing" label="Billing (cross-tenant)" width={W} height={H_DESKTOP}>
                <AdminBilling />
              </DCArtboard>
              <DCArtboard id="admin-templates" label="Industry templates" width={W} height={H_DESKTOP}>
                <AdminTemplates />
              </DCArtboard>
              <DCArtboard id="admin-system" label="System health + cron + ship-flags" width={W} height={H_DESKTOP}>
                <AdminSystem />
              </DCArtboard>
              <DCArtboard id="admin-support" label="Support inbox" width={W} height={H_DESKTOP}>
                <AdminSupport />
              </DCArtboard>
            </DCSection>

            <DCSection id="public-extras" title="11 — Publika extras" subtitle="Modulvisning, news, FAQ, status, cookie-banner">
              <DCArtboard id="module-page" label="Modulvisning · /public/deviations" width={W} height={2000}>
                <ModulePage />
              </DCArtboard>
              <DCArtboard id="news" label="Nyheter · /news" width={W} height={1600}>
                <News />
              </DCArtboard>
              <DCArtboard id="faq" label="FAQ · /faq" width={W} height={1400}>
                <FAQ />
              </DCArtboard>
              <DCArtboard id="status" label="Status · /support/status" width={W} height={1400}>
                <StatusPage />
              </DCArtboard>
              <DCArtboard id="cookie" label="Cookie consent (overlay)" width={W} height={H_DESKTOP}>
                <CookieConsent />
              </DCArtboard>
            </DCSection>

            {/* ─────────  MOBILE  ───────── */}
            {(() => {
              const MW = 406, MH = 860;
              const PhoneArt = ({ children }) => (
                <div style={{ display: "grid", placeItems: "center", width: "100%", height: "100%", padding: 8 }}>
                  <MPhone>{children}</MPhone>
                </div>
              );
              return (
                <>
                  <DCSection id="m-public" title="12 — Mobile · publika sidor" subtitle="Touch-first parallell till desktop">
                    <DCArtboard id="m-landing" label="Landing" width={MW} height={MH}><PhoneArt><MLanding /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-pricing" label="Pricing" width={MW} height={MH}><PhoneArt><MPricing /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-module" label="Modulvisning" width={MW} height={MH}><PhoneArt><MModulePage /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-news" label="News" width={MW} height={MH}><PhoneArt><MNews /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-faq" label="FAQ" width={MW} height={MH}><PhoneArt><MFAQ /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-status" label="Status" width={MW} height={MH}><PhoneArt><MStatusPage /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-cookie" label="Cookie consent · bottom sheet" width={MW} height={MH}><PhoneArt><MCookieConsent /></PhoneArt></DCArtboard>
                  </DCSection>

                  <DCSection id="m-auth" title="13 — Mobile · auth & onboarding" subtitle="Login, BankID, branschväljaren">
                    <DCArtboard id="m-login" label="Login" width={MW} height={MH}><PhoneArt><MLogin /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-onboarding" label="Onboarding · steg 3/6" width={MW} height={MH}><PhoneArt><MOnboarding /></PhoneArt></DCArtboard>
                  </DCSection>

                  <DCSection id="m-app" title="14 — Mobile · authed app" subtitle="Dashboard, avvikelser, notiser med bottom tab bar + center FAB">
                    <DCArtboard id="m-dashboard" label="Dashboard" width={MW} height={MH}><PhoneArt><MDashboard /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-dev-list" label="Avvikelser · lista" width={MW} height={MH}><PhoneArt><MDeviationsList /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-dev-detail" label="Avvikelse · detalj" width={MW} height={MH}><PhoneArt><MDeviationDetail /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-dev-new" label="Avvikelse · skapa" width={MW} height={MH}><PhoneArt><MDeviationNew /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-notifications" label="Notifieringar" width={MW} height={MH}><PhoneArt><MNotifications /></PhoneArt></DCArtboard>
                  </DCSection>

                  <DCSection id="m-modules" title="15 — Mobile · moduler" subtitle="Dokument, läkemedel, ordination, compliance, hygien">
                    <DCArtboard id="m-documents" label="Styrdokument" width={MW} height={MH}><PhoneArt><MDocuments /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-meds" label="Läkemedel · batchar & temp" width={MW} height={MH}><PhoneArt><MMedications /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-ord-inbox" label="Ordination · konsult-inbox" width={MW} height={MH}><PhoneArt><MOrdinationInbox /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-ord-detail" label="Ordination · BankID-godkänn" width={MW} height={MH}><PhoneArt><MOrdinationDetail /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-compliance" label="Compliance Center" width={MW} height={MH}><PhoneArt><MCompliance /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-hygiene-sched" label="Hygien · schema" width={MW} height={MH}><PhoneArt><MHygieneSchedule /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-hygiene-check" label="Hygien · pågående kontroll (befintlig)" width={MW} height={MH}><PhoneArt><HygieneMobile /></PhoneArt></DCArtboard>
                  </DCSection>

                  <DCSection id="m-modules-2" title="16 — Mobile · risk, personal, patienter" subtitle="Risk, staff, audit, customers, externals">
                    <DCArtboard id="m-risk" label="Risk · 5×5 matrix" width={MW} height={MH}><PhoneArt><MRisk /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-staff" label="Personal & legitimation" width={MW} height={MH}><PhoneArt><MStaff /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-audit" label="Audit log" width={MW} height={MH}><PhoneArt><MAudit /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-customers" label="Patienter · PDL" width={MW} height={MH}><PhoneArt><MCustomers /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-externals" label="Externa & rum" width={MW} height={MH}><PhoneArt><MExternals /></PhoneArt></DCArtboard>
                  </DCSection>

                  <DCSection id="m-meta" title="17 — Mobile · inställningar & special" subtitle="Settings, More, Inspector, Admin-notis">
                    <DCArtboard id="m-more" label="Mer (navigations-hub)" width={MW} height={MH}><PhoneArt><MMore /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-settings" label="Inställningar" width={MW} height={MH}><PhoneArt><MSettings /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-inspector" label="Inspector mode" width={MW} height={MH}><PhoneArt><MInspector /></PhoneArt></DCArtboard>
                    <DCArtboard id="m-admin" label="CK-admin · desktop-required" width={MW} height={MH}><PhoneArt><MAdminNotice /></PhoneArt></DCArtboard>
                  </DCSection>
                </>
              );
            })()}

          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Visuell ton" />
            <TweakRadio
              label="Primärfärg"
              value={t.primary}
              options={[
                { value: "forest", label: "Forest" },
                { value: "blue",   label: "Nordic" },
                { value: "clay",   label: "Clay" },
                { value: "slate",  label: "Slate" },
              ]}
              onChange={(v) => setTweak("primary", v)}
            />
            <TweakToggle label="Mörkt läge" value={t.dark} onChange={(v) => setTweak("dark", v)} />
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CareKompassDesign />);
  </script>
</body>
</html>
